<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام حجز الملاعب - جامعة الإسراء</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .login-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 180px);
            padding: 20px;
        }
        
        .login-card {
            background: var(--white);
            border-radius: 20px;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 900px;
            display: flex;
            overflow: hidden;
            animation: fadeIn 0.8s ease;
        }

        .login-form-side {
            flex: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .login-hero-side {
            flex: 1;
            background: url('https://app.iu.edu.jo/stb/Images/hero.jpeg') center/cover no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .login-hero-side::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(146, 25, 55, 0.2);
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header img {
            width: 120px;
            margin-bottom: 15px;
        }

        .login-header h2 {
            color: var(--primary-color);
            font-size: 1.5rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            transition: var(--transition);
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(146, 25, 55, 0.1);
        }

        .agreement-box {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 25px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .agreement-box input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .login-card {
                flex-direction: column-reverse;
            }
            .login-hero-side {
                height: 200px;
            }
        }
    </style>
</head>
<body>

<header class="main-header">
    <div class="burger-menu" id="burgerToggle">
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
    </div>
    <nav class="nav-menu" id="navMenu">
        <ul>
            <li><a href="login.html" class="active">الرئيسية</a></li>
            <li><a href="#">الملاعب</a></li>
        </ul>
    </nav>
    <div class="logo">
        <img src="https://app.iu.edu.jo/stb/Images/israaLogo2.png" alt="University Logo">
    </div>
</header>

<main class="login-wrapper">
    <div class="login-card">
        <div class="login-form-side">
            <div class="login-header">
                <img src="https://app.iu.edu.jo/stb/Images/israaLogo2.png" alt="Logo">
                <h2>نظام حجز الملاعب - تسجيل الدخول</h2>
            </div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label>رقم الطالب الجامعي:</label>
                    <input type="text" id="studentCode" placeholder="أدخل رقمك الجامعي" required>
                </div>
                
                <div class="form-group">
                    <label>كلمة المرور:</label>
                    <input type="password" id="password" placeholder="أدخل كلمة المرور" required>
                </div>
                
                <label class="agreement-box">
                    <input type="checkbox" id="chkAgree">
                    <span>الرجاء قراءة التعليمات والموافقة عليها لإتمام عملية الدخول</span>
                </label>
                
                <button type="submit" class="btn btn-primary" style="width: 100%;">تسجيل الدخول</button>
            </form>
        </div>
        <div class="login-hero-side"></div>
    </div>
</main>

<footer>
    <div class="footer-container">
        <p>جميع الحقوق محفوظة مركز الحاسوب © 2025</p>
        <div class="social-icons">
            <a href="#"><i class="fab fa-facebook-f"></i></a>
            <a href="#"><i class="fab fa-twitter"></i></a>
            <a href="#"><i class="fab fa-instagram"></i></a>
        </div>
    </div>
</footer>

<script src="main.js"></script>
</body>
</html>
