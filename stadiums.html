<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الملاعب - نظام حجز الملاعب</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        .stadiums-header {
            background: var(--white);
            padding: 40px 5%;
            text-align: center;
            margin-bottom: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .stadiums-header h1 {
            color: var(--primary-color);
            font-size: 2.2rem;
            font-weight: 700;
        }

        .category-filter {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 25px;
            border-radius: 25px;
            border: 1px solid #ddd;
            background: var(--white);
            cursor: pointer;
            transition: var(--transition);
            font-weight: 600;
        }

        .filter-btn.active, .filter-btn:hover {
            background: var(--primary-color);
            color: var(--white);
            border-color: var(--primary-color);
        }
    </style>
</head>
<body>

<header class="main-header">
    <div class="burger-menu" id="burgerToggle">
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
    </div>
    <nav class="nav-menu" id="navMenu">
        <ul>
            <li><a href="home.html">الرئيسية</a></li>
            <li><a href="stadiums.html">الملاعب</a></li>
            <li><a href="players.html">اللاعبين</a></li>
            <li><a href="login.html">تسجيل الخروج <i class="fas fa-sign-out-alt"></i></a></li>
        </ul>
    </nav>
    <div class="logo">
        <img src="https://app.iu.edu.jo/stb/Images/israaLogo2.png" alt="University Logo">
    </div>
</header>

<div class="stadiums-header">
    <h1>اختر ملعبك المفضل</h1>
    <div class="category-filter">
        <button class="filter-btn active">الكل</button>
        <button class="filter-btn">بادل</button>
        <button class="filter-btn">كرة قدم</button>
        <button class="filter-btn">سكواش</button>
        <button class="filter-btn">أخرى</button>
    </div>
</div>

<main class="stadium-grid" id="stadiumGrid">
    <!-- Will be populated via JS or hardcoded -->
</main>

<footer>
    <div class="footer-container">
        <p>جميع الحقوق محفوظة مركز الحاسوب © 2025</p>
        <div class="social-icons">
            <a href="#"><i class="fab fa-facebook-f"></i></a>
            <a href="#"><i class="fab fa-twitter"></i></a>
            <a href="#"><i class="fab fa-instagram"></i></a>
        </div>
    </div>
</footer>

<script src="main.js"></script>
<script>
    const stadiums = [
        { id: 'STD001', name: 'ملعب البادل A', img: 'https://app.iu.edu.jo/stb/Images/Padel_3.jpg', desc: 'البادل هو رياضة مضرب تُلعب غالبًا بشكل زوجي، في ملعب مغلق أصغر من ملعب التنس.' },
        { id: 'STD002', name: 'ملعب البادل B', img: 'https://app.iu.edu.jo/stb/Images/Padel_3.jpg', desc: 'البادل هو رياضة مضرب تُلعب غالبًا بشكل زوجي، في ملعب مغلق أصغر من ملعب التنس.' },
        { id: 'STD003', name: 'ملعب البادل C', img: 'https://app.iu.edu.jo/stb/Images/Padel_3.jpg', desc: 'البادل هو رياضة مضرب تُلعب غالبًا بشكل زوجي، في ملعب مغلق أصغر من ملعب التنس.' },
        { id: 'STD004', name: 'ملعب البادل D', img: 'https://app.iu.edu.jo/stb/Images/Padel_3.jpg', desc: 'البادل هو رياضة مضرب تُلعب غالبًا بشكل زوجي، في ملعب مغلق أصغر من ملعب التنس.' },
        { id: 'STD005', name: 'ملعب كرة القدم الخماسي', img: 'https://app.iu.edu.jo/stb/Images/sport1.jpg', desc: 'ملعب كرة القدم الخماسي مصمم للعب كرة القدم مع 5 لاعبين في كل فريق.' },
        { id: 'STD006', name: 'ملعب كرة القدم السداسي', img: 'https://app.iu.edu.jo/stb/Images/sport3.jpg', desc: 'ملعب كرة القدم السداسي مصمم لأداء المباريات مع 6 لاعبين في كل فريق.' },
        { id: 'STD007', name: 'ملعب شاطئي', img: 'https://app.iu.edu.jo/stb/Images/sport2.jpg', desc: 'ملعب شاطئي مخصص للرياضات التي تُلعب على الرمال مثل كرة القدم الشاطئية.' },
        { id: 'STD008', name: 'ملعب متعدد الاستخدام', img: 'https://app.iu.edu.jo/stb/Images/sport4.jpeg', desc: 'الملعب متعدد الاستخدام يوفر بيئة مثالية للعديد من الرياضات مثل كرة السلة والكرة الطائرة.' },
        { id: 'STD009', name: 'ملعب سكواتش A', img: 'https://app.iu.edu.jo/stb/Images/sport9.png', desc: 'السكواش من أكثر الرياضات التي تحرق السعرات، وتطور اللياقة بشكل كبير.' },
        { id: 'STD010', name: 'ملعب سكواتش B', img: 'https://app.iu.edu.jo/stb/Images/sport9.png', desc: 'السكواش من أكثر الرياضات التي تحرق السعرات، وتطور اللياقة بشكل كبير.' }
    ];

    const grid = document.getElementById('stadiumGrid');
    stadiums.forEach(s => {
        const card = document.createElement('div');
        card.className = 'stadium-card';
        card.innerHTML = `
            <img src="${s.img}" alt="${s.name}" class="stadium-img">
            <div class="stadium-info">
                <h3>${s.name}</h3>
                <p>${s.desc}</p>
                <a href="booking.html?id=${s.id}&name=${encodeURIComponent(s.name)}&img=${encodeURIComponent(s.img)}" class="btn btn-primary">احجز الآن</a>
            </div>
        `;
        grid.appendChild(card);
    });
</script>
</body>
</html>
